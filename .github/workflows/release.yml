name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter @smicolon/ai-kit build

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Auto-bump plugin patch versions
        id: autobump
        run: |
          node scripts/bump-plugin-versions.js
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit auto-bumped versions
        if: steps.autobump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: auto-bump plugin patch versions"
          git push

      - name: Check for changesets
        id: check
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        run: npx changeset version

      - name: Publish to npm
        if: steps.check.outputs.has_changesets == 'true'
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Commit version bumps
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release packages" || exit 0
          git push

      - name: Build standalone binaries
        if: steps.check.outputs.has_changesets == 'true'
        working-directory: packages/cli
        run: |
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/ai-kit-darwin-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile dist/ai-kit-darwin-x64
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile dist/ai-kit-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64 --outfile dist/ai-kit-linux-arm64
          gzip -k dist/ai-kit-darwin-arm64
          gzip -k dist/ai-kit-darwin-x64
          gzip -k dist/ai-kit-linux-x64
          gzip -k dist/ai-kit-linux-arm64

      - name: Create GitHub release
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            packages/cli/dist/ai-kit-darwin-arm64.gz \
            packages/cli/dist/ai-kit-darwin-x64.gz \
            packages/cli/dist/ai-kit-linux-x64.gz \
            packages/cli/dist/ai-kit-linux-arm64.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          SHA_DARWIN_ARM64=$(sha256sum packages/cli/dist/ai-kit-darwin-arm64.gz | cut -d' ' -f1)
          SHA_DARWIN_X64=$(sha256sum packages/cli/dist/ai-kit-darwin-x64.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum packages/cli/dist/ai-kit-linux-arm64.gz | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum packages/cli/dist/ai-kit-linux-x64.gz | cut -d' ' -f1)

          cat > /tmp/ai-kit.rb << FORMULA
          class AiKit < Formula
            desc "AI coding tool pack manager for Smicolon standards"
            homepage "https://github.com/smicolon/ai-kit"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/smicolon/ai-kit/releases/download/v${VERSION}/ai-kit-darwin-arm64.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/smicolon/ai-kit/releases/download/v${VERSION}/ai-kit-darwin-x64.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/smicolon/ai-kit/releases/download/v${VERSION}/ai-kit-linux-arm64.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/smicolon/ai-kit/releases/download/v${VERSION}/ai-kit-linux-x64.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "ai-kit"
            end

            test do
              assert_match "AI coding tool pack manager", shell_output("#{bin}/ai-kit --help")
            end
          end
          FORMULA

          # Push to homebrew-tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/smicolon/homebrew-tap.git /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          cp /tmp/ai-kit.rb /tmp/homebrew-tap/Formula/ai-kit.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ai-kit.rb
          git commit -m "ai-kit ${VERSION}"
          git push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
