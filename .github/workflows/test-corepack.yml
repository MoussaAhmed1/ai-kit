name: Test release pipeline pre-merge (temporary)

on:
  push:
    branches: [fix/release-npm-corepack]

jobs:
  test:
    name: Simulate release pipeline without npm upgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: bun build
        run: bun run --filter @smicolon/ai-kit build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Baseline npm (no upgrade — this is the new approach)
        run: |
          node --version
          which npm
          npm --version
          npm config get registry

      - name: Confirm the OLD upgrade step would still crash (proves the original bug)
        continue-on-error: true
        run: |
          set -x
          npm install -g npm@latest 2>&1 | tail -20
          echo "exit_code=$?"

      - name: Run auto-bump script (the only npm-adjacent step on non-changeset PRs)
        run: |
          node scripts/bump-plugin-versions.js
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "no bumps needed (auto-bump idempotent on this commit)"
          else
            echo "auto-bump produced changes — diff:"
            git --no-pager diff .claude-plugin/marketplace.json
            git checkout .claude-plugin/marketplace.json
          fi

      - name: Confirm npm publish dry-run works (validates trusted-publishing path)
        run: |
          # Build a fake tarball from the CLI package and dry-run publish.
          # --dry-run hits npm internals exactly the same way as the real publish but doesn't upload.
          cd packages/cli
          npm publish --dry-run --access public 2>&1 | tail -30
          echo "exit_code=$?"
