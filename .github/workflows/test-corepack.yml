name: Test release pipeline pre-merge (temporary)

on:
  push:
    branches: [fix/release-npm-corepack]

jobs:
  test:
    name: Simulate release pipeline (final HEAD state)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter @smicolon/ai-kit build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # NB: no npm upgrade step — this is exactly what release.yml does in HEAD.

      - name: Auto-bump plugin patch versions
        id: autobump
        run: |
          node scripts/bump-plugin-versions.js
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "auto-bump idempotent on this commit"
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "auto-bump produced a diff:"
            git --no-pager diff .claude-plugin/marketplace.json
            git checkout .claude-plugin/marketplace.json
          fi

      - name: Check for changesets
        id: check
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Confirm publish path works (dry-run, only the bit that uses npm)
        run: |
          cd packages/cli
          npm publish --dry-run --access public 2>&1 | tail -10
          echo "publish dry-run exit_code=$?"

      - name: Final summary
        run: |
          echo "auto-bump bumped: ${{ steps.autobump.outputs.bumped }}"
          echo "has_changesets: ${{ steps.check.outputs.has_changesets }}"
          echo "If has_changesets=false, the real release.yml exits cleanly here."
